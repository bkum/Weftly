name: b2b-getting-started
description: Validate a webMethods B2B/TN environment and onboard a sample partner.

requires: [curl, jq]

inputs:
  env_url:
    description: "TN base URL"
    required: true
  api_token:
    description: "API bearer token"
    required: true
    secret: true
  partner_name:
    description: "Sample partner name"
    default: "Acme Corp"

defaults:
  http:
    timeout: 30s
    headers:
      Authorization: "Bearer ${{ inputs.api_token }}"
      Content-Type: application/json

steps:
  - id: health
    name: Check B2B environment health
    http:
      GET: "${{ inputs.env_url }}/rest/health"
    assert: response.status == 200
    outputs:
      status: "${{ response.body.status }}"

  - id: lookup
    name: Look up existing partner (idempotency)
    http:
      GET: "${{ inputs.env_url }}/rest/partners?name=${{ urlquery(inputs.partner_name) }}"
    outputs:
      exists: "${{ response.body.total > 0 }}"

  - id: create
    name: Create trading partner if absent
    if: ${{ !steps.lookup.outputs.exists }}
    http:
      POST: "${{ inputs.env_url }}/rest/partners"
      body:
        name: "${{ inputs.partner_name }}"
    outputs:
      id: "${{ response.body.partnerId }}"

  - id: resolve_id
    name: Resolve partner id (created or existing) via jq
    run: |
      if [ -n "$CREATED_ID" ]; then
        echo "id=$CREATED_ID" >> "$WEFTLY_OUTPUT"
      else
        id=$(curl -sf -G "$ENV_URL/rest/partners" \
             --data-urlencode "name=$NAME" \
             -H "Authorization: Bearer $TOKEN" | jq -r '.partners[0].id')
        echo "id=$id" >> "$WEFTLY_OUTPUT"
      fi
    env:
      CREATED_ID: "${{ steps.create.outputs.id }}"
      ENV_URL:    "${{ inputs.env_url }}"
      NAME:       "${{ inputs.partner_name }}"
      TOKEN:      "${{ inputs.api_token }}"

  - id: sample
    name: Submit sample document and verify flow
    run: |
      doc_id=$(curl -sf -X POST \
        -H "Authorization: Bearer $TOKEN" \
        -H "Content-Type: application/json" \
        -d "{\"partnerId\":\"$PARTNER_ID\"}" \
        "$ENV_URL/rest/documents" | jq -r '.documentId')
      echo "doc_id=$doc_id" >> "$WEFTLY_OUTPUT"
    env:
      PARTNER_ID: "${{ steps.resolve_id.outputs.id }}"
      ENV_URL:    "${{ inputs.env_url }}"
      TOKEN:      "${{ inputs.api_token }}"

  - id: report
    name: Render onboarding report
    template:
      inline: |
        <!doctype html>
        <html><head><title>Onboarding — {{ .partner }}</title></head>
        <body>
          <h1>Weftly B2B onboarding</h1>
          <ul>
            <li>Environment: <code>{{ .env }}</code></li>
            <li>Partner: <strong>{{ .partner }}</strong> (<code>{{ .partner_id }}</code>)</li>
            <li>Sample document: <code>{{ .doc_id }}</code></li>
          </ul>
        </body></html>
      dest: ./out/onboarding-report.html
      vars:
        env: "${{ inputs.env_url }}"
        partner: "${{ inputs.partner_name }}"
        partner_id: "${{ steps.resolve_id.outputs.id }}"
        doc_id: "${{ steps.sample.outputs.doc_id }}"

  - summary: |
      ## B2B onboarding complete
      - **Environment:** ${{ inputs.env_url }} (health: ${{ steps.health.outputs.status }})
      - **Partner:** ${{ inputs.partner_name }} (`${{ steps.resolve_id.outputs.id }}`)
      - **Sample document:** `${{ steps.sample.outputs.doc_id }}`

  - upload:
      path: ./out/onboarding-report.html
      name: onboarding-report
