name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # weekly Tuesday 07:23 UTC
    - cron: '23 7 * * 2'

concurrency:
  group: govulncheck-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          # go.mod pins a specific patch, but stdlib CVEs get fixed in
          # later patches — install the latest 1.25.x so the scan sees
          # the freshest stdlib. Bump manually when we move to 1.26.
          go-version: '1.25.x'
          cache: true
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: run govulncheck
        run: govulncheck ./...
