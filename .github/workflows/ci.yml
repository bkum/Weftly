name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (a new push to a PR cancels the
# older run so CI signal reflects the tip).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. Individual jobs opt in to more as needed.
permissions:
  contents: read

jobs:
  lint:
    name: lint (gofmt + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt would rewrite these files:"
            echo "$fmt_out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...

  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # go.mod declares `go 1.25` — that's the floor. Test on the latest
        # 1.25.x patch (updated by setup-go automatically).
        go: ['1.25.x']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: go build (static)
        env:
          CGO_ENABLED: '0'
        run: go build ./...
      - name: go test with race detector
        run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - name: upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25.x'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: warn

  build-artifact:
    name: build (static binary sanity)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build weftly
        env:
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags '-s -w' -o weftly ./cmd/weftly
          file weftly
          ./weftly version
      - name: validate flagship example
        run: ./weftly validate examples/petclinic-onboarding.yml
      - uses: actions/upload-artifact@v7
        with:
          name: weftly-linux-amd64
          path: weftly
          if-no-files-found: error
