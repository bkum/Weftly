name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write   # create the release + upload artifacts
  id-token: write   # for future OIDC (cosign / sigstore) if desired

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # GoReleaser needs full history for changelog
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: verify tag matches module semver
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! echo "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::tag $tag is not a valid semver v-prefixed tag"
            exit 1
          fi
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
